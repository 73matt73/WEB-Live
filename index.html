<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live ШІ-Аналіз (Веб-камера)</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script defer src="script.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 1rem;
            background-color: #f3f4f6;
            color: #1f2937;
        }
        .app-wrapper {
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }
        h2 {
            margin-top: 0;
            color: #111827;
            font-size: 1.5rem;
        }
        .video-container {
            position: relative;
            width: 100%;
            margin-top: 20px;
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
            line-height: 0;
        }
        video {
            width: 100%;
            height: auto;
            display: block;
            transform: scaleX(-1);
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #status {
            margin: 15px 0;
            font-weight: 500;
            padding: 12px;
            background: #fef3c7;
            color: #92400e;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <h2>ШІ-аналіз емоцій у реальному часі</h2>
        <p>Наведіть камеру на обличчя.</p>
        <div id="status">Завантаження ШІ-моделей...</div>
        <div class="video-container" id="videoContainer">
            <video id="video" autoplay muted playsinline></video>
        </div>
    </div>
</body>
</html>
