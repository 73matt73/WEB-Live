<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live ШІ-Аналіз (Веб-камера)</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script defer src="script.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 2rem; 
            background-color: #f3f4f6; 
            color: #1f2937;
        }
        .app-wrapper {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2 { margin-top: 0; color: #111827; }
        .video-container { 
            position: relative; 
            display: inline-block; 
            margin-top: 20px; 
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
        }
        video { 
            display: block;
            max-width: 100%; 
        }
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
        }
        #status { 
            margin: 15px 0; 
            font-weight: 500; 
            padding: 12px; 
            background: #fef3c7; 
            color: #92400e;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <h2>ШІ-аналіз емоцій у реальному часі</h2>
        <p>Наведіть камеру на обличчя. Обробка відбувається безпосередньо у вашому браузері.</p>
        
        <div id="status">Завантаження ШІ-моделей... Зачекайте.</div>
        
        <div class="video-container" id="videoContainer">
            <video id="video" autoplay muted playsinline></video>
        </div>
    </div>

</body>
</html>
